name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        type: choice
        default: release
        options: [release, debug]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Add Chaquopy plugin
        run: |
          # Chaquopy integration — see docs for detailed setup
          echo "Chaquopy Gradle plugin must be configured in android/build.gradle and android/app/build.gradle"

      - name: Build APK
        working-directory: android
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
        run: |
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Collect APK
        run: |
          mkdir -p artifacts
          find android/app/build/outputs/apk -name '*.apk' -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtk-llm-chat-android-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
