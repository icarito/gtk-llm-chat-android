schema: spec-driven

context: |
  Android XMPP client built with Expo SDK 52, React Native 0.76, Expo Router 4
  and strict TypeScript. The versioned `android/` tree contains the native
  foreground-service module and must not be regenerated wholesale. Follow every
  trap in AGENTS.md. New work uses `openspec/changes/` and must pass `make check`.

